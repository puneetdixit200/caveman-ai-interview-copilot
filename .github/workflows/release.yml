name: Release Signed Desktop Builds

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish, for example v0.1.0
        required: true
        type: string
      release_notes:
        description: Release notes shown in GitHub and latest.json
        required: false
        default: Caveman signed desktop update.
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
  RELEASE_NOTES: ${{ inputs.release_notes || format('Caveman {0} signed desktop update.', github.ref_name) }}

jobs:
  build-windows:
    runs-on: windows-2025-vs2026
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      WINDOWS_CODESIGN_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CODESIGN_CERTIFICATE_BASE64 }}
      WINDOWS_CODESIGN_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_CERTIFICATE_PASSWORD }}
      WINDOWS_CODESIGN_TIMESTAMP_URL: http://timestamp.digicert.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate release signing secrets
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "Missing TAURI_SIGNING_PRIVATE_KEY repository secret. Generate an updater key with npm run tauri signer generate and save the private key in GitHub Actions secrets."
          }

      - name: Install dependencies
        run: npm ci

      - name: Verify release metadata scripts
        run: npm run test:release

      - name: Import Windows code-signing certificate
        if: ${{ env.WINDOWS_CODESIGN_CERTIFICATE_BASE64 != '' }}
        shell: powershell
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "caveman-codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CODESIGN_CERTIFICATE_BASE64))
          $securePassword = ConvertTo-SecureString $env:WINDOWS_CODESIGN_CERTIFICATE_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword | Where-Object { $_.HasPrivateKey } | Select-Object -First 1
          if (-not $cert) {
            throw "Imported PFX did not contain a certificate with a private key."
          }
          "WINDOWS_CODESIGN_CERTIFICATE_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV

      - name: Build signed updater assets
        shell: powershell
        run: >
          npm run tauri:build:signed --
          -ReleaseBaseUrl "https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}"
          -ReleaseNotes "${{ env.RELEASE_NOTES }}"

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: caveman-windows-signed-release
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/latest.json
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.sig

  build-macos:
    runs-on: macos-15-intel
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate release signing secrets
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "Missing TAURI_SIGNING_PRIVATE_KEY repository secret. Generate an updater key with npm run tauri signer generate and save the private key in GitHub Actions secrets."
          }

      - name: Install dependencies
        run: npm ci

      - name: Build signed macOS updater assets
        run: npm run tauri build -- --ci --bundles app --config src-tauri/tauri.release.conf.json

      - name: Create macOS DMG installer
        run: node scripts/create-macos-dmg.mjs

      - name: Upload macOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: caveman-macos-signed-release
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig

  build-linux:
    runs-on: ubuntu-24.04
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate release signing secrets
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "Missing TAURI_SIGNING_PRIVATE_KEY repository secret. Generate an updater key with npm run tauri signer generate and save the private key in GitHub Actions secrets."
          }

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev libpipewire-0.3-dev libasound2-dev libgbm-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build signed Linux updater assets
        run: npm run tauri build -- --ci --config src-tauri/tauri.release.conf.json

      - name: Upload Linux build artifact
        uses: actions/upload-artifact@v4
        with:
          name: caveman-linux-signed-release
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/deb/*.deb.sig

  publish-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download signed build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate combined latest.json
        run: >
          node scripts/generate-latest-json.mjs
          --bundle-dir release-assets
          --output release-assets/latest.json
          --base-url "https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}"
          --notes "${{ env.RELEASE_NOTES }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Caveman ${{ env.RELEASE_TAG }}
          body: ${{ env.RELEASE_NOTES }}
          draft: false
          prerelease: false
          files: |
            release-assets/latest.json
            release-assets/**/*.exe
            release-assets/**/*.msi
            release-assets/**/*.dmg
            release-assets/**/*.AppImage
            release-assets/**/*.deb
            release-assets/**/*.sig
