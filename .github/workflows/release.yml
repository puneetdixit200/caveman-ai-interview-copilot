          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | tee "$IDENTITIES_PATH"
          grep -F "$APPLE_SIGNING_IDENTITY" "$IDENTITIES_PATH"
          echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Prepare Apple notarization API key
        if: ${{ env.APPLE_API_PRIVATE_KEY_BASE64 != '' }}
        shell: bash
        run: |
          APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_PRIVATE_KEY_BASE64" | base64 --decode > "$APPLE_API_KEY_PATH" 2>/dev/null || printf '%s' "$APPLE_API_PRIVATE_KEY_BASE64" | base64 -D > "$APPLE_API_KEY_PATH"
          chmod 600 "$APPLE_API_KEY_PATH"
          echo "APPLE_API_KEY_PATH=$APPLE_API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Prepare Whisper sidecar
        run: npm run sidecars:prepare -- --target current --base-config src-tauri/tauri.release.conf.json --output-config src-tauri/target/tauri.release.sidecars.generated.conf.json

      - name: Build signed macOS updater assets
        run: npm run tauri build -- --ci --bundles app --config src-tauri/target/tauri.release.sidecars.generated.conf.json

      - name: Create macOS DMG installer
        run: node scripts/create-macos-dmg.mjs

      - name: Notarize macOS DMG installer
        run: node scripts/notarize-macos-dmg.mjs

      - name: Verify bundled Whisper sidecar
        run: npm run package:verify-sidecar

      - name: Verify packaged privacy shield
        run: node scripts/verify-privacy-shield-package.mjs --target macos-arm64 --write-attestation src-tauri/target/release/bundle/privacy-shield-macos-arm64.json

      - name: Upload macOS Apple Silicon build artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: caveman-macos-arm64-signed-release
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/release/bundle/privacy-shield-macos-arm64.json

  build-linux:
    runs-on: ubuntu-24.04
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate release signing secrets
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "Missing TAURI_SIGNING_PRIVATE_KEY repository secret. Generate an updater key with npm run tauri signer generate and save the private key in GitHub Actions secrets."
          }

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev libpipewire-0.3-dev libasound2-dev libgbm-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Prepare Whisper sidecar
        run: npm run sidecars:prepare -- --target current --base-config src-tauri/tauri.release.conf.json --output-config src-tauri/target/tauri.release.sidecars.generated.conf.json

      - name: Build signed Linux updater assets
        run: npm run tauri build -- --ci --config src-tauri/target/tauri.release.sidecars.generated.conf.json

      - name: Verify bundled Whisper sidecar
        run: npm run package:verify-sidecar

      - name: Verify packaged privacy shield
        run: node scripts/verify-privacy-shield-package.mjs --target linux-x64 --write-attestation src-tauri/target/release/bundle/privacy-shield-linux-x64.json

      - name: Upload Linux build artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: caveman-linux-signed-release
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/deb/*.deb.sig
            src-tauri/target/release/bundle/privacy-shield-linux-x64.json

  publish-release:
    needs: [build-windows, build-macos-intel, build-macos-arm64, build-linux]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22

      - name: Download signed build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: release-assets

      - name: Generate combined latest.json
        run: >
          node scripts/generate-latest-json.mjs
          --bundle-dir release-assets
          --output release-assets/latest.json
          --base-url "https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}"
          --notes "${{ env.RELEASE_NOTES }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Caveman ${{ env.RELEASE_TAG }}
          body: ${{ env.RELEASE_NOTES }}
          draft: false
          prerelease: false
          files: |
            release-assets/latest.json
            release-assets/**/*.exe
            release-assets/**/*.msi
            release-assets/**/*.dmg
            release-assets/**/*.app.tar.gz
            release-assets/**/*.AppImage
            release-assets/**/*.deb
            release-assets/**/*.sig
            release-assets/**/privacy-shield-*.json
