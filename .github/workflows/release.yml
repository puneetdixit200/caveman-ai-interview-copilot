name: Release Signed Desktop Builds

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish, for example v0.1.0
        required: true
        type: string
      release_notes:
        description: Release notes shown in GitHub and latest.json
        required: false
        default: Caveman signed desktop update.
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
  RELEASE_NOTES: ${{ inputs.release_notes || format('Caveman {0} signed desktop update.', github.ref_name) }}

jobs:
  build-windows:
    runs-on: windows-2025-vs2026
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      WINDOWS_CODESIGN_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CODESIGN_CERTIFICATE_BASE64 }}
      WINDOWS_CODESIGN_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_CERTIFICATE_PASSWORD }}
      WINDOWS_CODESIGN_TIMESTAMP_URL: http://timestamp.digicert.com
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate release signing secrets
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "Missing TAURI_SIGNING_PRIVATE_KEY repository secret. Generate an updater key with npm run tauri signer generate and save the private key in GitHub Actions secrets."
          }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CODESIGN_CERTIFICATE_BASE64)) {
            throw "Missing WINDOWS_CODESIGN_CERTIFICATE_BASE64 repository secret. Export the Windows Authenticode PFX as base64 before publishing commercial Windows installers."
          }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CODESIGN_CERTIFICATE_PASSWORD)) {
            throw "Missing WINDOWS_CODESIGN_CERTIFICATE_PASSWORD repository secret. Save the PFX password before publishing commercial Windows installers."
          }

      - name: Install dependencies
        run: npm ci

      - name: Verify release metadata scripts
        run: npm run test:release

      - name: Import Windows code-signing certificate
        if: ${{ env.WINDOWS_CODESIGN_CERTIFICATE_BASE64 != '' }}
        shell: powershell
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "caveman-codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CODESIGN_CERTIFICATE_BASE64))
          $securePassword = ConvertTo-SecureString $env:WINDOWS_CODESIGN_CERTIFICATE_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword | Where-Object { $_.HasPrivateKey } | Select-Object -First 1
          if (-not $cert) {
            throw "Imported PFX did not contain a certificate with a private key."
          }
          "WINDOWS_CODESIGN_CERTIFICATE_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV

      - name: Build signed updater assets
        shell: powershell
        run: >
          npm run tauri:build:signed --
          -ReleaseBaseUrl "https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}"
          -ReleaseNotes "${{ env.RELEASE_NOTES }}"

      - name: Verify bundled Whisper sidecar
        run: npm run package:verify-sidecar

      - name: Verify packaged privacy shield
        run: node scripts/verify-privacy-shield-package.mjs --target windows-x64 --write-attestation src-tauri/target/release/bundle/privacy-shield-windows-x64.json

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: caveman-windows-signed-release
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/latest.json
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.sig
            src-tauri/target/release/bundle/privacy-shield-windows-x64.json

  build-macos-intel:
    runs-on: macos-15-intel
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate release signing secrets
        shell: bash
        run: |
          missing=()
          for name in TAURI_SIGNING_PRIVATE_KEY APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY KEYCHAIN_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done

          if [[ -n "$APPLE_API_PRIVATE_KEY_BASE64" ]]; then
            for name in APPLE_API_ISSUER APPLE_API_KEY; do
              if [[ -z "${!name}" ]]; then
                missing+=("$name")
              fi
            done
          elif [[ -z "$APPLE_ID" || -z "$APPLE_PASSWORD" || -z "$APPLE_TEAM_ID" ]]; then
            missing+=("APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID or APPLE_API_ISSUER/APPLE_API_KEY/APPLE_API_PRIVATE_KEY_BASE64")
          fi

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing macOS release signing secrets: %s\n' "${missing[*]}" >&2
            printf 'Generate a Tauri updater key with npm run tauri signer generate and configure Apple Developer signing/notarization secrets.\n' >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Import Apple Developer certificate
        shell: bash
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/caveman-apple-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/caveman-signing.keychain-db"
          IDENTITIES_PATH="$RUNNER_TEMP/caveman-codesigning-identities.txt"

          decode_base64() {
            local value="$1"
            local output="$2"
            printf '%s' "$value" | base64 --decode > "$output" 2>/dev/null || printf '%s' "$value" | base64 -D > "$output"
          }

          decode_base64 "$APPLE_CERTIFICATE" "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | tee "$IDENTITIES_PATH"
          grep -F "$APPLE_SIGNING_IDENTITY" "$IDENTITIES_PATH"
          echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Prepare Apple notarization API key
        if: ${{ env.APPLE_API_PRIVATE_KEY_BASE64 != '' }}
        shell: bash
        run: |
          APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_PRIVATE_KEY_BASE64" | base64 --decode > "$APPLE_API_KEY_PATH" 2>/dev/null || printf '%s' "$APPLE_API_PRIVATE_KEY_BASE64" | base64 -D > "$APPLE_API_KEY_PATH"
          chmod 600 "$APPLE_API_KEY_PATH"
          echo "APPLE_API_KEY_PATH=$APPLE_API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Prepare Whisper sidecar
        run: npm run sidecars:prepare -- --target current --base-config src-tauri/tauri.release.conf.json --output-config src-tauri/target/tauri.release.sidecars.generated.conf.json

      - name: Build signed macOS updater assets
        run: npm run tauri build -- --ci --bundles app --config src-tauri/target/tauri.release.sidecars.generated.conf.json

      - name: Create macOS DMG installer
        run: node scripts/create-macos-dmg.mjs

      - name: Notarize macOS DMG installer
        run: node scripts/notarize-macos-dmg.mjs

      - name: Verify bundled Whisper sidecar
        run: npm run package:verify-sidecar

      - name: Verify packaged privacy shield
        run: node scripts/verify-privacy-shield-package.mjs --target macos-x64 --write-attestation src-tauri/target/release/bundle/privacy-shield-macos-x64.json

      - name: Upload macOS Intel build artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: caveman-macos-intel-signed-release
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/release/bundle/privacy-shield-macos-x64.json

  build-macos-arm64:
    runs-on: macos-15
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate release signing secrets
        shell: bash
        run: |
          missing=()
          for name in TAURI_SIGNING_PRIVATE_KEY APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY KEYCHAIN_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done

          if [[ -n "$APPLE_API_PRIVATE_KEY_BASE64" ]]; then
            for name in APPLE_API_ISSUER APPLE_API_KEY; do
              if [[ -z "${!name}" ]]; then
                missing+=("$name")
              fi
            done
          elif [[ -z "$APPLE_ID" || -z "$APPLE_PASSWORD" || -z "$APPLE_TEAM_ID" ]]; then
            missing+=("APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID or APPLE_API_ISSUER/APPLE_API_KEY/APPLE_API_PRIVATE_KEY_BASE64")
          fi

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing macOS release signing secrets: %s\n' "${missing[*]}" >&2
            printf 'Generate a Tauri updater key with npm run tauri signer generate and configure Apple Developer signing/notarization secrets.\n' >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Import Apple Developer certificate
        shell: bash
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/caveman-apple-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/caveman-signing.keychain-db"
          IDENTITIES_PATH="$RUNNER_TEMP/caveman-codesigning-identities.txt"

          decode_base64() {
            local value="$1"
            local output="$2"
            printf '%s' "$value" | base64 --decode > "$output" 2>/dev/null || printf '%s' "$value" | base64 -D > "$output"
          }

          decode_base64 "$APPLE_CERTIFICATE" "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
