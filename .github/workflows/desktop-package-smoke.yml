name: Desktop Package Smoke

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Windows installers
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Verify release packaging contracts
        run: npm run test:release

      - name: Build Windows packages
        run: npm run tauri:build:windows

      - name: Verify bundled Whisper sidecar
        run: npm run package:verify-sidecar

      - name: Verify packaged privacy shield
        run: node scripts/verify-privacy-shield-package.mjs --target windows-x64 --write-attestation src-tauri/target/release/bundle/privacy-shield-windows-x64.json

      - name: Upload Windows package artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: caveman-windows-package-smoke
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/privacy-shield-windows-x64.json

  build-macos-intel:
    name: macOS Intel app and DMG
    runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Verify release packaging contracts
        run: npm run test:release

      - name: Build macOS package
        run: npm run tauri:build:mac

      - name: Verify bundled Whisper sidecar
        run: npm run package:verify-sidecar

      - name: Verify packaged privacy shield
        run: node scripts/verify-privacy-shield-package.mjs --target macos-x64 --write-attestation src-tauri/target/release/bundle/privacy-shield-macos-x64.json

      - name: Upload macOS package artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: caveman-macos-intel-package-smoke
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/macos/Caveman.app
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/privacy-shield-macos-x64.json

  build-macos-arm64:
    name: macOS Apple Silicon app and DMG
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Verify release packaging contracts
        run: npm run test:release

      - name: Build macOS package
        run: npm run tauri:build:mac

      - name: Verify bundled Whisper sidecar
        run: npm run package:verify-sidecar

      - name: Verify packaged privacy shield
        run: node scripts/verify-privacy-shield-package.mjs --target macos-arm64 --write-attestation src-tauri/target/release/bundle/privacy-shield-macos-arm64.json

      - name: Upload macOS package artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: caveman-macos-arm64-package-smoke
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/macos/Caveman.app
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/privacy-shield-macos-arm64.json

  build-linux:
    name: Linux AppImage and DEB
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev libpipewire-0.3-dev libasound2-dev libgbm-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Verify release packaging contracts
        run: npm run test:release

      - name: Build Linux packages
        run: npm run tauri:build:linux

      - name: Verify bundled Whisper sidecar
        run: npm run package:verify-sidecar

      - name: Verify packaged privacy shield
        run: node scripts/verify-privacy-shield-package.mjs --target linux-x64 --write-attestation src-tauri/target/release/bundle/privacy-shield-linux-x64.json

      - name: Upload Linux package artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: caveman-linux-package-smoke
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/privacy-shield-linux-x64.json
